<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>

  <!-- Single document page — left-center -->
  <g transform="translate(80, 56)">
    <!-- Page body -->
    <rect x="0" y="0" width="180" height="240" rx="12" fill="url(#accent)" opacity="0.12"/>
    <rect x="0" y="0" width="180" height="240" rx="12" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.7"/>

    <!-- Text lines (3 groups separated by dashed cut lines) -->
    <!-- Group 1 -->
    <rect x="24" y="28" width="110" height="7" rx="3.5" fill="url(#accent)" opacity="0.5"/>
    <rect x="24" y="46" width="132" height="7" rx="3.5" fill="url(#accent)" opacity="0.35"/>

    <!-- Dashed cut line 1 -->
    <line x1="16" y1="72" x2="164" y2="72" stroke="url(#accent)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

    <!-- Group 2 -->
    <rect x="24" y="88" width="120" height="7" rx="3.5" fill="url(#accent)" opacity="0.5"/>
    <rect x="24" y="106" width="100" height="7" rx="3.5" fill="url(#accent)" opacity="0.35"/>
    <rect x="24" y="124" width="132" height="7" rx="3.5" fill="url(#accent)" opacity="0.35"/>

    <!-- Dashed cut line 2 -->
    <line x1="16" y1="150" x2="164" y2="150" stroke="url(#accent)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

    <!-- Group 3 -->
    <rect x="24" y="166" width="132" height="7" rx="3.5" fill="url(#accent)" opacity="0.5"/>
    <rect x="24" y="184" width="90" height="7" rx="3.5" fill="url(#accent)" opacity="0.35"/>
    <rect x="24" y="202" width="110" height="7" rx="3.5" fill="url(#accent)" opacity="0.35"/>
  </g>

  <!-- Arrow: document → chunks -->
  <g transform="translate(278, 168)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
    <polyline points="22,-7 32,0 22,7" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- 3 chunk cards — right side, stacked with offset -->
  <!-- Chunk 1 (green) — top -->
  <g transform="translate(324, 64)">
    <rect width="120" height="80" rx="10" fill="url(#c1)" opacity="0.15"/>
    <rect width="120" height="80" rx="10" fill="none" stroke="url(#c1)" stroke-width="2.5" opacity="0.8"/>
    <rect x="14" y="16" width="72" height="6" rx="3" fill="url(#c1)" opacity="0.6"/>
    <rect x="14" y="30" width="92" height="6" rx="3" fill="url(#c1)" opacity="0.4"/>
    <rect x="14" y="44" width="56" height="6" rx="3" fill="url(#c1)" opacity="0.3"/>
    <text x="96" y="70" font-family="monospace" font-size="12" fill="#34d399" opacity="0.6">#</text>
  </g>

  <!-- Chunk 2 (purple) — middle -->
  <g transform="translate(324, 168)">
    <rect width="120" height="80" rx="10" fill="url(#c2)" opacity="0.15"/>
    <rect width="120" height="80" rx="10" fill="none" stroke="url(#c2)" stroke-width="2.5" opacity="0.8"/>
    <rect x="14" y="16" width="84" height="6" rx="3" fill="url(#c2)" opacity="0.6"/>
    <rect x="14" y="30" width="64" height="6" rx="3" fill="url(#c2)" opacity="0.4"/>
    <rect x="14" y="44" width="92" height="6" rx="3" fill="url(#c2)" opacity="0.3"/>
    <text x="96" y="70" font-family="monospace" font-size="12" fill="#a78bfa" opacity="0.6">#</text>
  </g>

  <!-- Chunk 3 (orange) — bottom -->
  <g transform="translate(324, 272)">
    <rect width="120" height="80" rx="10" fill="url(#c3)" opacity="0.15"/>
    <rect width="120" height="80" rx="10" fill="none" stroke="url(#c3)" stroke-width="2.5" opacity="0.8"/>
    <rect x="14" y="16" width="92" height="6" rx="3" fill="url(#c3)" opacity="0.6"/>
    <rect x="14" y="30" width="52" height="6" rx="3" fill="url(#c3)" opacity="0.4"/>
    <rect x="14" y="44" width="76" height="6" rx="3" fill="url(#c3)" opacity="0.3"/>
    <text x="96" y="70" font-family="monospace" font-size="12" fill="#fb923c" opacity="0.6">#</text>
  </g>

  <!-- Connecting lines from cut sections to chunks (subtle) -->
  <line x1="260" y1="120" x2="324" y2="104" stroke="#34d399" stroke-width="1" opacity="0.25" stroke-dasharray="4,3"/>
  <line x1="260" y1="176" x2="324" y2="208" stroke="#a78bfa" stroke-width="1" opacity="0.25" stroke-dasharray="4,3"/>
  <line x1="260" y1="240" x2="324" y2="312" stroke="#fb923c" stroke-width="1" opacity="0.25" stroke-dasharray="4,3"/>

  <!-- Scissors icon near the first cut line -->
  <g transform="translate(64, 118)" opacity="0.45">
    <circle cx="4" cy="4" r="4" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <circle cx="4" cy="16" r="4" fill="none" stroke="url(#accent)" stroke-width="1.5"/>
    <line x1="8" y1="6" x2="16" y2="14" stroke="url(#accent)" stroke-width="1.5"/>
    <line x1="8" y1="14" x2="16" y2="6" stroke="url(#accent)" stroke-width="1.5"/>
  </g>

  <!-- "docprep" text at bottom -->
  <text x="256" y="440" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="42" fill="#e2e8f0" letter-spacing="2" opacity="0.9">docprep</text>
  <text x="256" y="468" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="16" fill="#94a3b8" letter-spacing="1" opacity="0.7">document → chunks</text>
</svg>
