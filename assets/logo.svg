<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Geometric abstract: structured fragmentation -->

  <!-- Large source shape (left) -->
  <rect x="80" y="136" width="152" height="168" rx="24"
    fill="#eef2ff" stroke="#6366f1" stroke-width="3"
    transform="rotate(-4, 156, 220)"/>

  <!-- Structure lines inside source -->
  <g transform="rotate(-4, 156, 220)" opacity="0.3">
    <rect x="112" y="184" width="88" height="5" rx="2.5" fill="#6366f1"/>
    <rect x="112" y="206" width="64" height="5" rx="2.5" fill="#6366f1"/>
    <rect x="112" y="228" width="76" height="5" rx="2.5" fill="#6366f1"/>
    <rect x="112" y="250" width="52" height="5" rx="2.5" fill="#6366f1"/>
  </g>

  <!-- Flow dots -->
  <circle cx="264" cy="220" r="3.5" fill="#c7d2fe"/>
  <circle cx="282" cy="220" r="3.5" fill="#a5b4fc"/>
  <circle cx="300" cy="220" r="3.5" fill="#818cf8"/>

  <!-- Fragment 1 (top) -->
  <rect x="328" y="108" width="112" height="68" rx="16"
    fill="#818cf8"/>

  <!-- Fragment 2 (center) -->
  <rect x="328" y="196" width="112" height="68" rx="16"
    fill="#6366f1"/>

  <!-- Fragment 3 (bottom) -->
  <rect x="328" y="284" width="112" height="68" rx="16"
    fill="#4f46e5"/>

  <!-- Subtle line accents on fragments -->
  <g opacity="0.4">
    <rect x="350" y="134" width="48" height="4" rx="2" fill="#fff"/>
    <rect x="350" y="146" width="32" height="4" rx="2" fill="#fff"/>
    <rect x="350" y="222" width="52" height="4" rx="2" fill="#fff"/>
    <rect x="350" y="234" width="36" height="4" rx="2" fill="#fff"/>
    <rect x="350" y="310" width="44" height="4" rx="2" fill="#fff"/>
    <rect x="350" y="322" width="28" height="4" rx="2" fill="#fff"/>
  </g>
</svg>
